<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoreLoom</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="LoreLoom.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0B0E1A;">
            <div style="text-align:center;">
                <h2 style="font-family:'Cinzel',Georgia,serif;color:#F0B952;font-size:2rem;letter-spacing:0.05em;margin-bottom:0.5rem;">LoreLoom</h2>
                <div style="display:flex;gap:6px;justify-content:center;margin-top:1rem;">
                    <span style="width:8px;height:8px;border-radius:50%;background:#F0B952;animation:pulse 1.2s ease-in-out infinite;"></span>
                    <span style="width:8px;height:8px;border-radius:50%;background:#B388FF;animation:pulse 1.2s ease-in-out 0.2s infinite;"></span>
                    <span style="width:8px;height:8px;border-radius:50%;background:#5ECDB0;animation:pulse 1.2s ease-in-out 0.4s infinite;"></span>
                </div>
                <style>@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}</style>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#x1F5D9;</span>
    </div>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
